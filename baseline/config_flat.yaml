# baseline/config_flat.yaml
Re: 100
mesh: "medium"
dt: 0.01
num_substeps: 170
n_probes: 6
warmup_steps: 500
reward_omega: 1.0

# PPO hyperparameters
total_timesteps: 500000
n_steps: 2048
n_epochs: 10
batch_size: 64
gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
vf_coef: 0.5
ent_coef: 0.01
max_grad_norm: 0.5
lr: 0.0003

# Logging and Visualization
log_interval: 1
save_interval: 50
run_name: "flat_ppo_re100"
verbose: false
viz_dir: "visualizations"
data_dir: "episode_data"
save_warmup_plots: true
save_episode_snapshots: true
save_episode_h5: true
snapshot_freq: 10